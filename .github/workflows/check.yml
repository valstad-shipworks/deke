name: Check

# Every workspace member is pure Rust and gets cargo check + clippy on each target,
# and tests execute natively per platform. deke-bench-retimers (an internal
# comparison harness whose tests run every retimer under wall-clock timeouts) is
# checked and linted but skipped in the test step to keep the matrix fast.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl }

    runs-on: ${{ matrix.platform.os }}
    name: ${{ matrix.platform.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}
          components: clippy

      - name: Install musl tools
        if: endsWith(matrix.platform.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Cargo check
        run: cargo check --workspace --target ${{ matrix.platform.target }}

      - name: Clippy
        run: cargo clippy --workspace --target ${{ matrix.platform.target }} -- -D warnings

      - name: Tests
        run: cargo test --workspace --exclude deke-bench-retimers --target ${{ matrix.platform.target }}
